<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="60%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="top-glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fdba74" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fdba74" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Gradient border (rounded square) -->
  <rect x="8" y="8" width="496" height="496" rx="120" ry="120" fill="url(#border-grad)"/>
  <!-- Dark inner background -->
  <rect x="20" y="20" width="472" height="472" rx="108" ry="108" fill="#020617"/>
  <!-- Top cyan glow -->
  <rect x="20" y="20" width="472" height="200" rx="108" ry="108" fill="url(#glow)"/>
  <!-- Top orange highlight -->
  <ellipse cx="256" cy="50" rx="80" ry="40" fill="url(#top-glow)"/>
  <!-- White "V" letter -->
  <text x="256" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="340" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="auto">V</text>
</svg>
